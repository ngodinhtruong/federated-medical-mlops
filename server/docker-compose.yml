# version: "3.8"

services:

  minio:
    image: minio/minio
    container_name: minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin12345
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - project_default
  fl-server-mlp:
  fl-server-mlp:
    build:
      context: .
      dockerfile: dockerfile.flower
    image: fl-server:latest
    container_name: fl-server-mlp
    container_name: fl-server-mlp
    restart: unless-stopped
    command: [ "/bin/sh", "/opt/fl/entrypoint_fl.sh" ]
    command: [ "/bin/sh", "/opt/fl/entrypoint_fl.sh" ]
    environment:
      SERVER_LOG_LEVEL: INFO
      MINIO_PREFIX: "training/mlp"
      SERVER_ID: "server-mlp"
      MINIO_PREFIX: "training/mlp"
      SERVER_ID: "server-mlp"
    networks:
      - project_default
    volumes:
      - .:/opt/fl
    ports:
      - "8080:8080"

  fl-server-cnn:
    image: fl-server:latest
    container_name: fl-server-cnn
    restart: unless-stopped
    command: [ "/bin/sh", "/opt/fl/entrypoint_fl.sh" ]
    environment:
      SERVER_LOG_LEVEL: INFO
      MINIO_PREFIX: "training/cnn"
      SERVER_ID: "server-cnn"
    networks:
      - project_default
    volumes:
      - .:/opt/fl
    ports:
      - "8082:8080"

  fl-server-logreg:
    image: fl-server:latest
    container_name: fl-server-logreg
    restart: unless-stopped
    command: [ "/bin/sh", "/opt/fl/entrypoint_fl.sh" ]
    environment:
      SERVER_LOG_LEVEL: INFO
      MINIO_PREFIX: "training/logreg"
      SERVER_ID: "server-logreg"
    networks:
      - project_default
    volumes:
      - .:/opt/fl
    ports:
      - "8083:8080"

  fl-server-cnn:
    image: fl-server:latest
    container_name: fl-server-cnn
    restart: unless-stopped
    command: [ "/bin/sh", "/opt/fl/entrypoint_fl.sh" ]
    environment:
      SERVER_LOG_LEVEL: INFO
      MINIO_PREFIX: "training/cnn"
      SERVER_ID: "server-cnn"
    networks:
      - project_default
    volumes:
      - .:/opt/fl
    ports:
      - "8082:8080"

  fl-server-logreg:
    image: fl-server:latest
    container_name: fl-server-logreg
    restart: unless-stopped
    command: [ "/bin/sh", "/opt/fl/entrypoint_fl.sh" ]
    environment:
      SERVER_LOG_LEVEL: INFO
      MINIO_PREFIX: "training/logreg"
      SERVER_ID: "server-logreg"
    networks:
      - project_default
    volumes:
      - .:/opt/fl
    ports:
      - "8083:8080"

  postgres:
    image: postgres:13
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U airflow" ]
      test: [ "CMD-SHELL", "pg_isready -U airflow" ]
      interval: 5s
      retries: 5
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      - project_default


  mlflow:
    build:
      context: .
      dockerfile: dockerfile.mlflow
    container_name: mlflow
    restart: unless-stopped
    depends_on:
      - postgres
      - minio
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: admin12345
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    command: >
      mlflow server --backend-store-uri postgresql://airflow:airflow@postgres/mlflow --default-artifact-root s3://fl-artifacts/mlflow --host 0.0.0.0 --port 5000
      mlflow server --backend-store-uri postgresql://airflow:airflow@postgres/mlflow --default-artifact-root s3://fl-artifacts/mlflow --host 0.0.0.0 --port 5000
    ports:
      - "5000:5000"
    networks:
      - project_default

  airflow-init:
    build:
      context: .
      dockerfile: dockerfile.airflow
    image: apache/airflow:2.8.0
    container_name: airflow-init
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"

      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin

      PIP_ADDITIONAL_REQUIREMENTS: "minio==7.2.5 mlflow==2.9.2"
      PYTHONPATH: /opt/fl
      PIP_ADDITIONAL_REQUIREMENTS: "minio==7.2.5 mlflow==2.9.2"
      PYTHONPATH: /opt/fl
    env_file:
      - .env
    user: "0:0"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - .:/opt/fl
      - .:/opt/fl
    command: db init
    networks:
      - project_default
  airflow-webserver:
    image: apache/airflow:2.8.0
    container_name: airflow-web
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      PYTHONPATH: /opt/fl

      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT: fl_experiment
      MLFLOW_MODEL_NAME: fl_model
      PIP_ADDITIONAL_REQUIREMENTS: "minio==7.2.5 mlflow==2.9.2"

      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: admin12345
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_DEFAULT_REGION: us-east-1
      AWS_S3_FORCE_PATH_STYLE: "true"
    env_file:
      - .env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/opt/fl
    ports:
      - "8081:8080"

    command: webserver
    networks:
      - project_default
  airflow-scheduler:
    image: apache/airflow:2.8.0
    container_name: airflow-scheduler
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      PYTHONPATH: /opt/fl
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT: fl_experiment
      MLFLOW_MODEL_NAME: fl_model
      PIP_ADDITIONAL_REQUIREMENTS: "minio==7.2.5 mlflow==2.9.2"

      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: admin12345
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_DEFAULT_REGION: us-east-1
      AWS_S3_FORCE_PATH_STYLE: "true"
    env_file:
      - .env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/opt/fl
    command: scheduler
    networks:
      - project_default

  monitor:
    build:
      context: ./monitor
    container_name: fl-monitor
    restart: unless-stopped
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: admin12345
      MINIO_BUCKET: fl-artifacts
    volumes:
      - //var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8090:8000"
    networks:
      - project_default
    depends_on:
      - minio
  fast-api-server:
    build:
      context: .
      dockerfile: inference_api/dockerfile.fastapi
    image: fast-api-server:latest
    container_name: fast-api-server
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=admin12345
    networks:
      - project_default
volumes:
  postgres-db-volume:
  mlflow-artifacts:
  minio_data:
networks:
  project_default:
    external: true
